# Prefix: Ctrl+A (easier than Ctrl+B)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse support
set -g mouse on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows on close
set -g renumber-windows on

# History
set -g history-limit 50000

# 256 color + true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes with Alt+arrow (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Switch windows with Shift+arrow
bind -n S-Left previous-window
bind -n S-Right next-window

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Status bar
set -g status-position bottom
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-left '#[fg=#89b4fa,bold] #S '
set -g status-right '#[fg=#a6adc8] %H:%M '
set -g status-left-length 30

# Window status
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[fg=#89b4fa,bold] #I:#W '

# Faster escape (for vim/neovim)
set -sg escape-time 10

# Auto-attach on SSH login (useful for VMs)
# Add to .bashrc: [ -z "$TMUX" ] && tmux new-session -A -s main
